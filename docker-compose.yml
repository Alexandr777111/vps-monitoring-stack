services:
  redis:
    image: redis:alpine
    container_name: my-redis
    ports:
      - "6379:6379"
    restart: always

  cadvisor:
    image: zcube/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
    restart: always
